name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # The model benchmark itself is local-only (needs macOS 27 + the `fm` CLI).
      # CI only enforces that the prompt matches the last benchmarked snapshot,
      # so the prompt can't change without a fresh local benchmark run.
      - name: Check commit-prompt snapshot is current
        run: npm run check:prompt
